<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARENA ARC | Master Tournament Hub</title>
    
    <!-- Mobile feel optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .phone-container { 
            width: 100%; 
            max-width: 448px; 
            min-height: 100vh; 
            position: relative; 
            border-left: 1px solid #e2e8f0; 
            border-right: 1px solid #e2e8f0; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.03); 
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
        
        .nav-blur { 
            backdrop-filter: blur(20px); 
            background: rgba(255, 255, 255, 0.96); 
            border-top: 1px solid #f1f5f9;
        }

        input, select, textarea { font-size: 16px !important; outline: none; border-radius: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. Firebase System Config ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyCpy1G0tMVuZ4DSPsU2E8Z3qdekc1_HtZE",
                authDomain: "arena-arc.firebaseapp.com",
                projectId: "arena-arc",
                storageBucket: "arena-arc.firebasestorage.app",
                messagingSenderId: "1057349537608",
                appId: "1:1057349537608:web:78350b5d95a72766f56d7d"
            };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        // RULE 1: Consistent AppID is required for Firestore Segments
        const appId = (typeof __app_id !== 'undefined' && __app_id) ? __app_id : 'arena-arc-final-prod'; 
        const ADMIN_PASSCODE = "12345678"; 

        const MATCH_TYPES = [
            { id: 'classic_erangel', label: 'Classic Erangel', req: 4 },
            { id: 'classic_miramar', label: 'Classic Miramar', req: 4 },
            { id: 'tdm_4v4', label: 'TDM 4v4', req: 4 },
            { id: 'tdm_2v2', label: 'TDM 2v2', req: 2 },
            { id: 'tdm_1v1', label: 'TDM 1v1', req: 1 }
        ];

        const INITIAL_MATCH_STATE = { 
            title: '', 
            prizePool: '', 
            entryFee: '', 
            matchType: 'classic_erangel', 
            date: '', 
            time: '',
            whatsappLink: ''
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [activeTab, setActiveTab] = useState('home');
            const [adminSubTab, setAdminSubTab] = useState('manager');
            const [homeFilter, setHomeFilter] = useState('all');
            
            // Cloud Collections
            const [matches, setMatches] = useState([]);
            const [registrations, setRegistrations] = useState([]);
            const [config, setConfig] = useState({ upiId: 'arena@upi', supportLink: 'https://t.me/arena_support' });
            
            // Interaction Controllers
            const [loading, setLoading] = useState(true);
            const [notification, setNotification] = useState(null);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [showMatchForm, setShowMatchForm] = useState(false);
            const [selectedTournament, setSelectedTournament] = useState(null);
            const [isRegistering, setIsRegistering] = useState(false);
            
            // Consolidated State for Zero-Level Sync
            const [matchForm, setMatchForm] = useState(INITIAL_MATCH_STATE);

            // 1. Authentication Engine (Rule 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token).catch(() => auth.signInAnonymously());
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Critical Auth Fail:", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Real-time Cloud Data Hub (Rule 1 & Rule 3 Combined)
            useEffect(() => {
                if (!user) return; // Prevent "Missing Permission" on load
                
                // Constructing paths exactly as required by the segments: artifacts/{appId}/public/data/{collection}
                const dataPath = `artifacts/${appId}/public/data`;
                
                const unsubM = db.collection(`${dataPath}/matches`).onSnapshot(
                    s => setMatches(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    e => { console.error(e); notify("Sync Denied: Matches", "error"); }
                );
                
                const unsubR = db.collection(`${dataPath}/registrations`).onSnapshot(
                    s => setRegistrations(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    e => { console.error(e); notify("Sync Denied: Regs", "error"); }
                );

                const unsubS = db.collection(`${dataPath}/settings`).doc('global').onSnapshot(
                    s => s.exists && setConfig(s.data()),
                    e => console.warn("Config sync pending...")
                );

                return () => { unsubM(); unsubR(); unsubS(); };
            }, [user]);

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [activeTab, isAdmin, matches, loading, showAdminLogin, adminSubTab, isRegistering, selectedTournament, showMatchForm]);

            const notify = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handleAdminLogin = (val) => {
                if (val === ADMIN_PASSCODE) {
                    setIsAdmin(true); setShowAdminLogin(false); setActiveTab('home'); notify("Master Hub Active");
                } else { notify("Incorrect Passcode", "error"); }
            };

            // CRUD: PROPER PUBLISH LOGIC (Fixed Segment Error by cleaning payload)
            const saveMatch = async () => {
                if (!user || !matchForm.title) {
                    notify("Enter match title", "error");
                    return;
                }
                const colPath = `artifacts/${appId}/public/data/matches`;
                try {
                    const data = { ...matchForm };
                    const docId = data.id;
                    delete data.id; // CRITICAL: ID must not be in payload body

                    if (docId) {
                        await db.collection(colPath).doc(docId).update(data);
                    } else {
                        await db.collection(colPath).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                    setShowMatchForm(false);
                    setMatchForm(INITIAL_MATCH_STATE);
                    notify("Live Arena Synced Successfully");
                } catch (e) {
                    console.error("Save Error:", e);
                    notify("Sync Failed. Check Segments.", "error");
                }
            };

            const submitRegistration = async (form) => {
                if (!user || !selectedTournament) return;
                const path = `artifacts/${appId}/public/data/registrations`;
                try {
                    await db.collection(path).add({
                        ...form,
                        matchId: selectedTournament.id,
                        matchTitle: selectedTournament.title,
                        userId: user.uid,
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setIsRegistering(false); setSelectedTournament(null); setActiveTab('entries'); notify("UTR Received Successfully");
                } catch (e) { notify("Submission Error", "error"); }
            };

            const filteredMatches = useMemo(() => {
                return homeFilter === 'all' ? matches : matches.filter(m => m.matchType === homeFilter);
            }, [matches, homeFilter]);

            if (loading) return (
                <div className="h-screen w-full bg-white flex items-center justify-center">
                    <div className="text-orange-600 font-black italic text-4xl animate-pulse tracking-tighter uppercase leading-none">ARENA ARC</div>
                </div>
            );

            return (
                <div className="phone-container antialiased uppercase italic font-black leading-none">
                    
                    {notification && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[600] px-8 py-4 rounded-3xl shadow-2xl font-black text-[10px] animate-in slide-in-from-top-4 ${notification.type==='success'?'bg-emerald-600 text-white shadow-emerald-200':'bg-red-600 text-white shadow-red-200'}`}>
                            {notification.msg}
                        </div>
                    )}

                    {/* App Header */}
                    <header className="p-4 bg-white/95 backdrop-blur-xl border-b border-slate-100 flex justify-between items-center sticky top-0 z-[100] shadow-sm leading-none">
                        <div className="flex items-center gap-2 leading-none">
                            <div className="bg-orange-600 p-2.5 rounded-2xl shadow-lg shadow-orange-100 text-white"><i data-lucide="gamepad-2" className="w-5 h-5"></i></div>
                            <h1 className="text-xl font-black italic tracking-tighter text-slate-900 leading-none">ARENA ARC</h1>
                        </div>
                        <div className="flex gap-2">
                            <a href={config.supportLink} target="_blank" className="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-blue-600 active:scale-90 transition-transform"><i data-lucide="send" className="w-5 h-5"></i></a>
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAdminLogin(true)} className={`p-2.5 rounded-xl border transition-all ${isAdmin ? 'bg-orange-600 text-white border-orange-500 shadow-lg' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>
                                <i data-lucide="star" className={`w-5 h-5 ${isAdmin ? 'fill-white' : ''}`}></i>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-5 space-y-10 pb-40 overflow-y-auto scrollbar-hide italic leading-none font-black uppercase">
                        {isAdmin ? (
                            /* Admin Management View */
                            <div className="space-y-8 animate-slide-up">
                                <div className="flex gap-2 p-1.5 bg-slate-100 rounded-3xl border border-slate-200 shadow-inner leading-none uppercase">
                                    <button onClick={() => setAdminSubTab('manager')} className={`flex-1 py-4 rounded-2xl text-[9px] font-black transition-all ${adminSubTab==='manager'?'bg-orange-600 text-white shadow-xl shadow-orange-200':'text-slate-400'}`}>MANAGER</button>
                                    <button onClick={() => setAdminSubTab('verify')} className={`flex-1 py-4 rounded-2xl text-[9px] font-black transition-all ${adminSubTab==='verify'?'bg-orange-600 text-white shadow-xl shadow-orange-200':'text-slate-400'}`}>VERIFY</button>
                                    <button onClick={() => setAdminSubTab('settings')} className={`flex-1 py-4 rounded-2xl text-[9px] font-black transition-all ${adminSubTab==='settings'?'bg-orange-600 text-white shadow-xl shadow-orange-200':'text-slate-400'}`}>CONFIG</button>
                                </div>

                                {adminSubTab === 'manager' && (
                                    <div className="space-y-6">
                                        <button onClick={() => { setMatchForm(INITIAL_MATCH_STATE); setShowMatchForm(true); }} className="w-full bg-orange-600 py-6 rounded-[35px] text-white font-black text-xs tracking-widest shadow-xl uppercase leading-none">+ Publish Match</button>
                                        <div className="space-y-4">
                                            {matches.map(m => (
                                                <div key={m.id} className="bg-slate-50 p-6 rounded-[35px] border border-slate-200 flex justify-between items-center shadow-sm italic font-black">
                                                    <div><h4 className="font-black text-lg text-slate-900 leading-none mb-1 uppercase tracking-tighter">{m.title}</h4><p className="text-[9px] text-slate-400 tracking-widest uppercase italic">{m.matchType?.replace('_',' ')} • ₹{m.prizePool}</p></div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setMatchForm(m); setShowMatchForm(true); }} className="p-3 text-orange-600 bg-white border border-slate-200 rounded-2xl active:scale-90 transition-all shadow-sm"><i data-lucide="edit-3" className="w-5 h-5"></i></button>
                                                        <button onClick={() => db.collection(`artifacts/${appId}/public/data/matches`).doc(m.id).delete()} className="p-3 text-red-500 bg-white border border-slate-200 rounded-2xl active:scale-90 transition-all shadow-sm"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {adminSubTab === 'verify' && (
                                    <div className="space-y-6 italic font-black uppercase">
                                        {registrations.filter(r => r.status === 'pending').map(reg => (
                                            <div key={reg.id} className="bg-white p-8 rounded-[45px] border border-slate-200 space-y-8 shadow-2xl relative overflow-hidden group italic uppercase">
                                                <div className="absolute top-0 left-0 w-2.5 h-full bg-orange-600 shadow-xl shadow-orange-950/20"></div>
                                                <div className="flex justify-between items-start leading-none">
                                                    <div><h4 className="font-black text-2xl text-slate-900 mb-1 tracking-tighter uppercase leading-none italic">{reg.teamName}</h4><p className="text-[10px] text-slate-400 font-bold uppercase">{reg.matchTitle}</p></div>
                                                    <p className="text-2xl font-black text-emerald-600 italic tracking-tighter">₹{reg.entryFee || '0'}</p>
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-[35px] text-center space-y-4 border border-slate-100 shadow-inner italic uppercase">
                                                    <div className="space-y-1">
                                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-[4px]">UTR REF CHECK</p>
                                                        <p className="text-3xl font-black text-slate-800 tracking-[1px] select-all leading-none italic uppercase">{reg.paymentId}</p>
                                                    </div>
                                                    <div className="pt-4 border-t border-slate-200 flex items-center justify-center gap-3">
                                                        <i data-lucide="phone" className="w-4 h-4 text-orange-500"></i>
                                                        <p className="text-lg text-orange-600 font-black tracking-widest leading-none italic uppercase">{reg.iglPhone}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('registrations').doc(reg.id).update({status: 'confirmed'})} className="w-full py-6 bg-emerald-600 rounded-[30px] font-black text-white shadow-xl active:scale-95 transition-all text-xs tracking-widest uppercase italic">APPROVE SQUAD</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {adminSubTab === 'settings' && (
                                    <div className="space-y-8 bg-slate-50 p-10 rounded-[50px] border border-slate-200 shadow-sm leading-none italic uppercase font-black">
                                        <h3 className="text-2xl font-black text-orange-600 text-center tracking-tighter uppercase leading-none italic uppercase">Master Hub</h3>
                                        <div className="space-y-8 leading-none">
                                            <div className="space-y-3 leading-none italic"><label className="text-[10px] text-slate-400 font-black ml-5 uppercase italic tracking-widest leading-none">Payment UPI ID</label>
                                                <input className="w-full bg-white border border-slate-200 p-6 rounded-[30px] outline-none font-black text-slate-900 italic uppercase shadow-inner leading-none" value={config.upiId} onChange={e => setConfig({...config, upiId: e.target.value})} style={{fontSize: '16px'}} />
                                            </div>
                                            <div className="space-y-3 leading-none italic"><label className="text-[10px] text-slate-400 font-black ml-5 uppercase italic tracking-widest leading-none">Telegram Support</label>
                                                <input className="w-full bg-white border border-slate-200 p-6 rounded-[30px] outline-none font-black text-slate-900 italic shadow-inner leading-none" value={config.supportLink} onChange={e => setConfig({...config, supportLink: e.target.value})} style={{fontSize: '16px'}} />
                                            </div>
                                            <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global').set(config).then(() => notify("Synced Cloud Hub"))} className="w-full py-7 bg-blue-600 rounded-[35px] font-black text-white shadow-lg uppercase italic tracking-widest leading-none shadow-blue-900/20 italic">Update Configuration</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            /* Player Main Arena Hub */
                            <div className="space-y-10 animate-fade-up">
                                {activeTab === 'home' ? (
                                    <div className="space-y-10">
                                        <h2 className="text-3xl font-black text-slate-900 flex items-center gap-3 tracking-tighter leading-none italic uppercase"><i data-lucide="trophy" className="text-orange-500 w-8 h-8"></i> Live Arena</h2>
                                        <div className="flex gap-2 overflow-x-auto scrollbar-hide -mx-5 px-5 leading-none font-black italic uppercase">
                                            <button onClick={() => setHomeFilter('all')} className={`px-6 py-4 rounded-full text-[10px] font-black border transition-all italic uppercase ${homeFilter==='all'?'bg-orange-600 text-white border-orange-500 shadow-lg shadow-orange-200':'bg-white text-slate-400 border-slate-200'}`}>ALL</button>
                                            {MATCH_TYPES.map(m => (
                                                <button key={m.id} onClick={() => setHomeFilter(m.id)} className={`px-6 py-4 rounded-full text-[10px] font-black whitespace-nowrap border transition-all italic uppercase ${homeFilter===m.id?'bg-orange-600 text-white border-orange-500 shadow-lg shadow-orange-200':'bg-white text-slate-400 border-slate-200'}`}>{m.label.toUpperCase()}</button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-1 gap-6 leading-none">
                                            {filteredMatches.map(m => (
                                                <div key={m.id} onClick={() => setSelectedTournament(m)} className="bg-white p-8 rounded-[50px] border border-slate-100 shadow-xl shadow-slate-200/50 space-y-8 active:scale-95 transition-all relative overflow-hidden group italic leading-none uppercase italic">
                                                    <div className="flex justify-between items-center relative z-10 leading-none">
                                                        <span className="text-[10px] font-black bg-orange-50 text-orange-600 px-5 py-2 rounded-full border border-orange-100 uppercase tracking-[3px] leading-none uppercase italic">{m.matchType?.replace('_',' ')} MODE</span>
                                                        <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none italic">{m.date || 'TBD'} • {m.time || 'TBD'}</span>
                                                    </div>
                                                    <h3 className="text-3xl font-black italic tracking-tighter text-slate-900 leading-tight uppercase leading-none italic uppercase">{m.title}</h3>
                                                    <div className="flex justify-between items-end border-t border-slate-50 pt-8 relative z-10 leading-none italic font-black uppercase italic uppercase">
                                                        <div><p className="text-[10px] text-slate-400 uppercase font-black mb-1.5 tracking-widest leading-none italic font-black uppercase">Grand Prize</p><p className="text-4xl font-black text-slate-900 tracking-tighter leading-none italic font-black uppercase leading-none">₹{m.prizePool}</p></div>
                                                        <div className="bg-orange-600 px-10 py-4 rounded-[25px] text-[12px] font-black text-white tracking-[4px] shadow-lg shadow-orange-900/20 uppercase italic leading-none">JOIN</div>
                                                    </div>
                                                </div>
                                            ))}
                                            {filteredMatches.length === 0 && <div className="py-32 text-center opacity-30 text-[11px] font-black tracking-[8px] uppercase animate-pulse italic uppercase leading-none">Syncing Hub...</div>}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-12 animate-fade-up">
                                        <h2 className="text-3xl font-black text-slate-900 tracking-tighter leading-none uppercase italic uppercase italic leading-none"><i data-lucide="award" className="inline text-orange-500 mr-2 w-8 h-8"></i> Activity Hub</h2>
                                        <div className="space-y-6">
                                            {registrations.filter(r => r.userId === user?.uid).map(reg => (
                                                <div key={reg.id} className="bg-white p-8 rounded-[56px] border border-slate-100 shadow-2xl space-y-5 relative shadow-slate-200/40 leading-none italic font-black uppercase">
                                                    <div className="flex justify-between items-center leading-none italic font-black uppercase">
                                                        <div className="leading-none uppercase font-black italic font-black"><h4 className="font-black text-3xl text-slate-900 tracking-tighter uppercase mb-2 leading-none italic uppercase font-black">{reg.teamName}</h4><p className="text-[11px] text-slate-400 uppercase tracking-[4px] leading-none italic tracking-widest uppercase">{reg.matchTitle}</p></div>
                                                        <StatusBadge status={reg.status} />
                                                    </div>
                                                </div>
                                            ))}
                                            {registrations.filter(r => r.userId === user?.uid).length === 0 && <div className="text-center py-40 opacity-20 text-[11px] font-black tracking-[6px] uppercase italic font-black leading-none uppercase italic">History empty</div>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Persistent Navigation */}
                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] px-8 z-50 leading-none">
                        <div className="nav-blur rounded-full px-14 py-8 flex justify-between shadow-2xl border border-slate-100 leading-none uppercase italic shadow-black/10 italic">
                            <button onClick={() => {setActiveTab('home'); setIsAdmin(false)}} className={`transition-all duration-300 leading-none ${activeTab==='home' && !isAdmin ? 'text-orange-600 scale-125' : 'text-slate-300 hover:text-slate-400'}`}><i data-lucide="layout-dashboard" className="w-7 h-7"></i></button>
                            <button onClick={() => {setActiveTab('entries'); setIsAdmin(false)}} className={`transition-all duration-300 leading-none ${activeTab==='entries' && !isAdmin ? 'text-orange-600 scale-125' : 'text-slate-300 hover:text-slate-400'}`}><i data-lucide="award" className="w-7 h-7"></i></button>
                        </div>
                    </nav>

                    {/* Admin Login Modal */}
                    {showAdminLogin && (
                        <div className="fixed inset-0 z-[400] bg-white/95 flex items-center justify-center p-6 italic font-black uppercase leading-none antialiased">
                            <div className="bg-white w-full max-sm p-14 rounded-[70px] border border-slate-100 text-center space-y-10 shadow-2xl animate-fade-up leading-none italic uppercase italic uppercase">
                                <div className="w-24 h-24 bg-orange-50 text-orange-600 rounded-[35px] flex items-center justify-center mx-auto shadow-inner leading-none italic font-black uppercase"><i data-lucide="lock" className="w-12 h-12"></i></div>
                                <h3 className="text-4xl font-black italic uppercase tracking-tighter text-slate-900 leading-none uppercase italic uppercase italic">Master Gate</h3>
                                <input type="password" id="pass-field" className="w-full bg-slate-50 border border-slate-200 p-8 rounded-[35px] text-center text-4xl font-black tracking-[15px] outline-none h-24 shadow-inner uppercase italic leading-none italic uppercase italic" placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && handleAdminLogin(e.target.value)} autoFocus />
                                <button onClick={() => handleAdminLogin(document.getElementById('pass-field').value)} className="w-full bg-orange-600 py-8 rounded-[40px] font-black italic shadow-2xl shadow-orange-950/20 h-20 text-xl text-white uppercase italic leading-none shadow-orange-900/10 italic uppercase font-black uppercase">UNLOCK HUB</button>
                                <button onClick={() => setShowAdminLogin(false)} className="text-slate-400 text-[10px] font-black uppercase tracking-[6px] italic leading-none uppercase italic uppercase">CLOSE</button>
                            </div>
                        </div>
                    )}

                    {/* Match Selection Modal */}
                    {selectedTournament && !isRegistering && (
                        <div className="fixed inset-0 z-[100] flex items-end justify-center bg-slate-900/50 backdrop-blur-sm leading-none antialiased italic font-black uppercase leading-none italic">
                            <div className="bg-white w-full p-14 rounded-t-[75px] border-t border-slate-100 space-y-14 text-slate-900 animate-slide-up shadow-2xl leading-none italic font-black uppercase italic uppercase leading-none">
                                <div className="w-20 h-1.5 bg-slate-100 rounded-full mx-auto mb-4 leading-none italic font-black uppercase italic"></div>
                                <div className="space-y-4 leading-none italic uppercase font-black leading-none italic font-black uppercase leading-none italic uppercase uppercase leading-none">
                                    <span className="text-[12px] font-black text-orange-600 tracking-[6px] uppercase leading-none italic font-black italic leading-none italic uppercase uppercase leading-none">{selectedTournament.matchType?.replace('_',' ')} MODE</span>
                                    <h3 className="text-6xl font-black tracking-tighter leading-tight italic uppercase leading-none italic font-black uppercase tracking-tight italic uppercase leading-none">{selectedTournament.title}</h3>
                                    <div className="pt-2 opacity-40 text-[11px] font-black tracking-widest leading-none italic font-black uppercase italic leading-none italic uppercase leading-none">{selectedTournament.date} • {selectedTournament.time}</div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 leading-none italic font-black uppercase italic leading-none italic uppercase font-black leading-none italic uppercase font-black uppercase">
                                    <div className="bg-slate-50 p-12 rounded-[55px] text-center space-y-5 shadow-inner border border-slate-100 leading-none font-black uppercase leading-none italic uppercase leading-none italic uppercase"><p className="text-[11px] text-slate-400 tracking-widest leading-none italic font-black uppercase leading-none uppercase italic font-black uppercase">PRIZE</p><p className="text-5xl font-black text-orange-600 tracking-tighter leading-none italic font-black uppercase leading-none italic leading-none italic uppercase">₹{selectedTournament.prizePool}</p></div>
                                    <div className="bg-slate-50 p-12 rounded-[55px] text-center space-y-5 shadow-inner border border-slate-100 leading-none font-black uppercase leading-none italic uppercase leading-none italic uppercase"><p className="text-[11px] text-slate-400 tracking-widest leading-none italic font-black uppercase leading-none uppercase italic font-black uppercase">ENTRY</p><p className="text-5xl font-black text-emerald-600 tracking-tighter leading-none italic font-black uppercase leading-none italic leading-none italic uppercase uppercase">₹{selectedTournament.entryFee}</p></div>
                                </div>
                                <button onClick={() => setIsRegistering(true)} className="w-full bg-orange-600 py-10 rounded-[50px] font-black uppercase text-2xl shadow-2xl shadow-orange-100 text-white italic tracking-[6px] leading-none shadow-orange-950/40 italic font-black leading-none uppercase italic uppercase font-black uppercase">JOIN ARENA ARC</button>
                                <button onClick={() => setSelectedTournament(null)} className="w-full text-slate-400 font-bold uppercase text-[12px] tracking-[8px] leading-none uppercase italic font-black leading-none italic uppercase">RETURN</button>
                            </div>
                        </div>
                    )}

                    {/* Registration Portal Modal */}
                    {isRegistering && selectedTournament && (
                        <div className="fixed inset-0 z-[500] bg-white/98 flex items-center justify-center p-6 overflow-y-auto antialiased leading-none italic font-black uppercase">
                            <div className="bg-white w-full max-sm p-12 rounded-[75px] border border-slate-100 space-y-10 shadow-2xl shadow-slate-200 relative leading-none animate-fade-up italic font-black uppercase leading-none italic font-black">
                                <h3 className="text-4xl font-black italic uppercase text-orange-600 text-center tracking-tighter leading-none italic font-black uppercase italic leading-none">Submission</h3>
                                <RegistrationForm tourney={selectedTournament} upiId={config.upiId} onSubmit={submitRegistration} onCancel={() => {setIsRegistering(false); setSelectedTournament(null)}} />
                            </div>
                        </div>
                    )}

                    {/* Admin Logic Creator Modal */}
                    {showMatchForm && (
                        <div className="fixed inset-0 z-[500] bg-white/98 flex items-center justify-center p-6 italic font-black uppercase overflow-y-auto leading-none antialiased italic font-black uppercase leading-none">
                            <div className="bg-white w-full max-md p-12 rounded-[64px] border border-slate-100 space-y-8 shadow-2xl shadow-slate-200 relative animate-slide-up leading-none italic font-black uppercase italic uppercase leading-none italic font-black uppercase leading-none italic">
                                <h3 className="text-3xl font-black italic uppercase text-orange-600 text-center tracking-tighter leading-none italic uppercase leading-none italic uppercase">Arena Logic</h3>
                                <div className="space-y-6 italic font-black uppercase leading-none italic uppercase leading-none italic">
                                    <input placeholder="Match Name" className="w-full bg-slate-50 border border-slate-200 p-6 rounded-[30px] text-slate-900 outline-none font-black italic shadow-inner uppercase font-bold leading-none italic uppercase italic font-black uppercase leading-none" value={matchForm.title} onChange={e => setMatchForm({...matchForm, title: e.target.value})} style={{fontSize: '16px'}} />
                                    <div className="grid grid-cols-2 gap-3 leading-none font-black uppercase italic uppercase italic leading-none italic uppercase">
                                        {MATCH_TYPES.map(m => (
                                            <button key={m.id} onClick={() => setMatchForm({...matchForm, matchType: m.id})} className={`p-4 rounded-3xl border text-[9px] font-black uppercase transition-all leading-none italic uppercase italic font-black uppercase leading-none ${matchForm.matchType === m.id ? 'bg-orange-600 border-orange-500 text-white shadow-lg' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>{m.label}</button>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 uppercase font-black leading-none italic uppercase leading-none italic uppercase leading-none italic font-black uppercase">
                                        <input type="date" className="bg-slate-50 border border-slate-200 p-6 rounded-[30px] text-slate-900 outline-none w-full italic font-black leading-none italic uppercase italic font-black uppercase leading-none" value={matchForm.date} onChange={e => setMatchForm({...matchForm, date: e.target.value})} />
                                        <input type="time" className="bg-slate-50 border border-slate-200 p-6 rounded-[30px] text-slate-900 outline-none w-full italic font-black leading-none italic uppercase italic font-black uppercase leading-none" value={matchForm.time} onChange={e => setMatchForm({...matchForm, time: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 uppercase font-black leading-none italic uppercase leading-none italic uppercase font-black uppercase italic leading-none font-black uppercase">
                                        <input placeholder="Prize (₹)" className="bg-slate-50 border border-slate-200 p-6 rounded-[30px] text-slate-900 outline-none font-black italic shadow-inner font-black leading-none italic uppercase italic font-black uppercase leading-none" value={matchForm.prizePool} onChange={e => setMatchForm({...matchForm, prizePool: e.target.value})} style={{fontSize: '16px'}} />
                                        <input placeholder="Fee (₹)" className="bg-slate-50 border border-slate-200 p-6 rounded-[30px] text-slate-900 outline-none font-black italic shadow-inner font-black leading-none italic uppercase italic font-black uppercase leading-none" value={matchForm.entryFee} onChange={e => setMatchForm({...matchForm, entryFee: e.target.value})} style={{fontSize: '16px'}} />
                                    </div>
                                </div>
                                <button onClick={handlePublishArena} className="w-full bg-orange-600 py-7 rounded-[40px] font-black uppercase italic shadow-2xl text-white shadow-orange-950/20 text-xl leading-none italic uppercase font-black uppercase italic uppercase font-black uppercase">PUBLISH ARENA</button>
                                <button onClick={() => {setShowMatchForm(false); setMatchForm(INITIAL_MATCH_STATE);}} className="w-full text-slate-400 text-[11px] font-black tracking-[5px] italic leading-none italic uppercase font-black uppercase italic uppercase leading-none italic uppercase font-black uppercase">CANCEL</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Sub-component: Clean Registration Logic Audit
        function RegistrationForm({ tourney, upiId, onSubmit, onCancel }) {
            const [step, setStep] = useState(1);
            const [reg, setReg] = useState({ teamName: '', iglPhone: '', paymentId: '' });
            const [p, setP] = useState([{n:'',i:''},{n:'',i:''},{n:'',i:''},{n:'',i:''}] );

            const req = 4;
            const valid = reg.teamName.length > 2 && reg.iglPhone.length === 10 && p.every(x => x.n.trim() && x.i.length === 10);

            return step === 1 ? (
                <div className="space-y-8 italic font-black uppercase leading-none">
                    <div className="space-y-6">
                        <div className="space-y-2 leading-none"><label className="text-[11px] text-slate-400 font-black ml-6 tracking-widest uppercase italic">Team Name</label>
                            <input placeholder="Soul / Entity" className="w-full bg-slate-50 border border-slate-200 p-7 rounded-[35px] text-slate-900 outline-none font-black shadow-inner italic uppercase leading-none italic" value={reg.teamName} onChange={e => setReg({...reg, teamName: e.target.value})} style={{fontSize: '16px'}} />
                        </div>
                        <div className="space-y-2 leading-none"><label className="text-[11px] text-slate-400 font-black ml-6 tracking-widest uppercase italic">IGL Mobile</label>
                            <input placeholder="91XXXXXXXX" className="w-full bg-slate-50 border border-slate-200 p-7 rounded-[35px] text-slate-900 outline-none font-black tracking-widest shadow-inner italic uppercase leading-none italic" value={reg.iglPhone} onChange={e => setReg({...reg, iglPhone: e.target.value.replace(/\D/g,'').slice(0,10)})} style={{fontSize: '16px'}} />
                        </div>
                    </div>
                    <div className="space-y-4 italic font-black uppercase">
                       <p className="text-[10px] text-orange-500 tracking-[3px] ml-6 font-black italic uppercase leading-none italic">4 Players Mandatory (10 Digit ID)</p>
                       <div className="space-y-2 italic font-black uppercase">
                          {p.map((x, i) => (
                            <div key={i} className="flex gap-2 leading-none">
                               <input placeholder={`P${i+1} IGN`} className="flex-1 bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-black text-xs leading-none" value={x.n} onChange={e => { const next = [...p]; next[i].n = e.target.value; setP(next); }} style={{fontSize: '16px'}} />
                               <input placeholder="ID (10)" className="w-32 bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none font-black text-xs tracking-widest text-orange-500 italic leading-none" value={x.i} onChange={e => { const next = [...p]; next[i].i = e.target.value.replace(/\D/g,'').slice(0,10); setP(next); }} style={{fontSize: '16px'}} />
                            </div>
                          ))}
                       </div>
                    </div>
                    <button disabled={!valid} onClick={() => setStep(2)} className={`w-full py-8 rounded-[40px] font-black uppercase italic shadow-2xl text-xl leading-none italic uppercase ${valid ? 'bg-orange-600 text-white shadow-orange-950/20 active:scale-95' : 'bg-slate-100 text-slate-300 grayscale opacity-50'}`}>Proceed to Fee</button>
                    <button onClick={onCancel} className="w-full text-slate-400 text-[11px] font-black uppercase tracking-[5px] leading-none uppercase italic">Return</button>
                </div>
            ) : (
                <div className="space-y-12 text-center animate-slide-up duration-300 leading-none italic uppercase font-black uppercase">
                   <div className="space-y-3 leading-none italic">
                      <p className="text-[11px] text-slate-400 tracking-[6px] uppercase italic leading-none">TRANSFER FEE</p>
                      <p className="text-8xl font-black text-slate-900 tracking-tighter leading-none italic uppercase">₹{tourney.entryFee}</p>
                   </div>
                   <div className="bg-slate-50 p-10 rounded-[48px] border border-slate-100 shadow-inner italic space-y-4">
                      <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest italic leading-none">UPI Address</p>
                      <p className="text-2xl font-black text-slate-900 tracking-widest select-all uppercase leading-none italic bg-white p-5 rounded-3xl border border-slate-100 shadow-sm leading-none">{upiId}</p>
                   </div>
                   <div className="space-y-3 leading-none italic">
                      <label className="text-[10px] text-emerald-600 font-black ml-4 uppercase leading-none italic">Verified UTR</label>
                      <input placeholder="XXXXXXXXXXXX" className="w-full bg-slate-50 border border-emerald-100 p-8 rounded-[40px] text-slate-900 outline-none text-center font-black tracking-[8px] shadow-inner uppercase italic leading-none" value={reg.paymentId} onChange={e => setReg({...reg, paymentId: e.target.value.toUpperCase()})} style={{fontSize: '16px'}} />
                   </div>
                   <div className="flex gap-4">
                      <button onClick={() => setStep(1)} className="flex-1 py-7 bg-slate-50 rounded-[40px] font-black uppercase text-xs italic text-slate-400 leading-none">Back</button>
                      <button disabled={reg.paymentId.length < 6} onClick={() => onSubmit({ ...reg, players: p, entryFee: tourney.entryFee })} className={`flex-[2] py-7 bg-orange-600 rounded-[40px] font-black uppercase text-white shadow-xl shadow-orange-950/20 active:scale-95 transition-all italic leading-none uppercase ${reg.paymentId.length < 6 ? 'grayscale opacity-30' : ''}`}>Submit Review</button>
                   </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            const styles = {
                pending: 'bg-orange-50 text-orange-600 border-orange-100 shadow-sm italic font-black uppercase px-6 py-3 rounded-full text-[10px] border tracking-[4px] leading-none italic uppercase',
                confirmed: 'bg-emerald-50 text-emerald-600 border-emerald-100 shadow-sm italic font-black uppercase px-6 py-3 rounded-full text-[10px] border tracking-[4px] leading-none italic uppercase',
                rejected: 'bg-red-50 text-red-600 border-red-100 shadow-sm italic font-black uppercase px-6 py-3 rounded-full text-[10px] border tracking-[4px] leading-none italic uppercase',
            };
            return <span className={styles[status] || 'bg-slate-50 text-slate-400 border-slate-200 shadow-sm italic font-black uppercase px-6 py-3 rounded-full text-[10px] border tracking-[4px] leading-none italic uppercase'}>{status === 'confirmed' ? 'APPROVED' : status.toUpperCase()}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
